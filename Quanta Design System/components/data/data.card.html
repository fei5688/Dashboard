<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style> body { margin: 0; padding: 26px; background: var(--surface-page); } </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Table, Sparkline, Badge } = window.QuantaDesignSystem_e41436;
  const ROWS = [
    { page: '/dashboard', views: 48210, conv: '4.8%', trend: [20,24,22,28,30,34,38], status: 'up' },
    { page: '/pricing', views: 31044, conv: '6.1%', trend: [40,38,36,33,30,28,25], status: 'down' },
    { page: '/blog/retention', views: 22190, conv: '2.3%', trend: [10,12,15,14,18,22,26], status: 'up' },
    { page: '/changelog', views: 9821, conv: '1.1%', trend: [8,8,9,9,8,9,10], status: 'flat' },
  ];
  function Demo() {
    const [sortBy, setSortBy] = React.useState('views');
    const [dir, setDir] = React.useState('desc');
    React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
    const sorted = [...ROWS].sort((a,b) => (dir==='asc'?1:-1) * (a[sortBy] > b[sortBy] ? 1 : -1));
    const onSort = (k) => { if (k===sortBy) setDir(d=>d==='asc'?'desc':'asc'); else { setSortBy(k); setDir('desc'); } };
    const tones = { up:'success', down:'danger', flat:'neutral' };
    return (
      <Table
        sortBy={sortBy} sortDir={dir} onSort={onSort}
        columns={[
          { key:'page', header:'Page', width:'30%' },
          { key:'views', header:'Views', align:'right', sortable:true, render:v=>v.toLocaleString() },
          { key:'conv', header:'Conv.', align:'right', sortable:true },
          { key:'trend', header:'7-day trend', align:'right', width:'120px', render:v=><div style={{display:'flex',justifyContent:'flex-end'}}><Sparkline data={v} width={90} height={24} color={v[0]>v[v.length-1]?'var(--neg)':'var(--accent)'} /></div> },
          { key:'status', header:'Status', render:v=><Badge tone={tones[v]} dot>{v}</Badge> },
        ]}
        data={sorted}
        rowKey={r=>r.page}
        onRowClick={()=>{}}
      />
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
