<!-- @dsCard group="Spacing" viewport="700x180" name="Radii & Elevation" subtitle="Minimal rounding · subtle cool shadows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); display: flex; gap: 30px; align-items: center; flex-wrap: wrap; }
  .col { display: flex; gap: 16px; }
  .box { width: 64px; height: 64px; background: var(--surface-card); border: 1px solid var(--border-default); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; }
  .box span { font-family: var(--font-mono); font-size: 9px; color: var(--text-tertiary); }
  .el { border: none; }
  .divider { width: 1px; align-self: stretch; background: var(--border-default); }
</style>
</head>
<body>
  <div class="col">
    <div class="box" style="border-radius:var(--radius-xs)"><span>xs</span></div>
    <div class="box" style="border-radius:var(--radius-sm)"><span>sm</span></div>
    <div class="box" style="border-radius:var(--radius-md)"><span>md</span></div>
    <div class="box" style="border-radius:var(--radius-lg)"><span>lg</span></div>
  </div>
  <div class="divider"></div>
  <div class="col">
    <div class="box el" style="border-radius:var(--radius-md);box-shadow:var(--shadow-xs)"><span>xs</span></div>
    <div class="box el" style="border-radius:var(--radius-md);box-shadow:var(--shadow-sm)"><span>sm</span></div>
    <div class="box el" style="border-radius:var(--radius-md);box-shadow:var(--shadow-md)"><span>md</span></div>
    <div class="box el" style="border-radius:var(--radius-md);box-shadow:var(--shadow-lg)"><span>lg</span></div>
  </div>
</body>
</html>
