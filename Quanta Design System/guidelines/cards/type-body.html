<!-- @dsCard group="Type" viewport="700x230" name="Body & UI Text" subtitle="Working sizes, weights, overline" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-card); display: grid; grid-template-columns: 1fr 1fr; gap: 14px 36px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); margin-bottom: 4px; }
  p { margin: 0; }
</style>
</head>
<body>
  <div>
    <div class="label">md · 14 · regular — default body</div>
    <p style="font-size:14px;color:var(--text-primary)">Daily active sessions climbed 12% week over week across all regions.</p>
  </div>
  <div>
    <div class="label">base · 13 · secondary</div>
    <p style="font-size:13px;color:var(--text-secondary)">Supporting copy and table cells sit one step down in tone.</p>
  </div>
  <div>
    <div class="label">sm · 12 · tertiary</div>
    <p style="font-size:12px;color:var(--text-tertiary)">Captions, axis labels, metadata.</p>
  </div>
  <div>
    <div class="label">overline · 11 · caps</div>
    <p class="q-overline">Last 30 days</p>
  </div>
</body>
</html>
