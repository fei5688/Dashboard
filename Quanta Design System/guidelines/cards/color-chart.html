<!-- @dsCard group="Colors" viewport="700x150" name="Chart Categorical" subtitle="8-step ramp for series & segments" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-card); }
  .row { display: flex; gap: 10px; }
  .chip { flex: 1; display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .dot { width: 100%; height: 52px; border-radius: var(--radius-sm); }
  .nm { font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="chip"><div class="dot" style="background:var(--chart-1)"></div><span class="nm">chart-1</span></div>
    <div class="chip"><div class="dot" style="background:var(--chart-2)"></div><span class="nm">chart-2</span></div>
    <div class="chip"><div class="dot" style="background:var(--chart-3)"></div><span class="nm">chart-3</span></div>
    <div class="chip"><div class="dot" style="background:var(--chart-4)"></div><span class="nm">chart-4</span></div>
    <div class="chip"><div class="dot" style="background:var(--chart-5)"></div><span class="nm">chart-5</span></div>
    <div class="chip"><div class="dot" style="background:var(--chart-6)"></div><span class="nm">chart-6</span></div>
    <div class="chip"><div class="dot" style="background:var(--chart-7)"></div><span class="nm">chart-7</span></div>
    <div class="chip"><div class="dot" style="background:var(--chart-8)"></div><span class="nm">chart-8</span></div>
  </div>
</body>
</html>
