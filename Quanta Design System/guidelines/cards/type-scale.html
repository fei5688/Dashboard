<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="Archivo display steps, tight tracking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-card); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); width: 78px; flex: none; }
  .spec { font-family: var(--font-sans); color: var(--text-primary); letter-spacing: var(--tracking-tight); line-height: 1.1; white-space: nowrap; }
</style>
</head>
<body>
  <div class="row"><span class="meta">5xl · 700</span><span class="spec" style="font-size:46px;font-weight:700;letter-spacing:var(--tracking-tighter)">Quanta</span></div>
  <div class="row"><span class="meta">3xl · 600</span><span class="spec" style="font-size:34px;font-weight:600">Revenue overview</span></div>
  <div class="row"><span class="meta">2xl · 600</span><span class="spec" style="font-size:26px;font-weight:600">Active users</span></div>
  <div class="row"><span class="meta">xl · 600</span><span class="spec" style="font-size:20px;font-weight:600">Cohort retention</span></div>
  <div class="row"><span class="meta">lg · 500</span><span class="spec" style="font-size:16px;font-weight:500">Segment breakdown</span></div>
</body>
</html>
