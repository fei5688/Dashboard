<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing Scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-card); display: flex; flex-direction: column; gap: 7px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .bar { height: 14px; background: var(--accent); border-radius: var(--radius-xs); }
  .nm { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); width: 116px; flex: none; }
</style>
</head>
<body>
  <div class="row"><span class="nm">space-2 · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="nm">space-3 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="nm">space-5 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="nm">space-7 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="nm">space-8 · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="nm">space-10 · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="nm">space-11 · 64</span><div class="bar" style="width:64px"></div></div>
</body>
</html>
