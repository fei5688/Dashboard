<!-- @dsCard group="Colors" viewport="700x150" name="Neutral Ramp" subtitle="Cool grey · the backbone of the system" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-card); }
  .ramp { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-default); }
  .sw { flex: 1; height: 64px; display: flex; align-items: flex-end; padding: 5px; }
  .sw span { font-family: var(--font-mono); font-size: 9px; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="sw" style="background:var(--gray-0)"><span style="color:var(--gray-500)">0</span></div>
    <div class="sw" style="background:var(--gray-50)"><span style="color:var(--gray-500)">50</span></div>
    <div class="sw" style="background:var(--gray-100)"><span style="color:var(--gray-500)">100</span></div>
    <div class="sw" style="background:var(--gray-200)"><span style="color:var(--gray-600)">200</span></div>
    <div class="sw" style="background:var(--gray-300)"><span style="color:var(--gray-700)">300</span></div>
    <div class="sw" style="background:var(--gray-400)"><span style="color:var(--gray-0)">400</span></div>
    <div class="sw" style="background:var(--gray-500)"><span style="color:var(--gray-0)">500</span></div>
    <div class="sw" style="background:var(--gray-600)"><span style="color:var(--gray-0)">600</span></div>
    <div class="sw" style="background:var(--gray-700)"><span style="color:var(--gray-0)">700</span></div>
    <div class="sw" style="background:var(--gray-800)"><span style="color:var(--gray-0)">800</span></div>
    <div class="sw" style="background:var(--gray-900)"><span style="color:var(--gray-0)">900</span></div>
    <div class="sw" style="background:var(--gray-950)"><span style="color:var(--gray-0)">950</span></div>
  </div>
</body>
</html>
